<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uno</title>
    <link rel="stylesheet" href="bootstrap/css/bootstrap.min.css">
    <script src="bootstrap/js/bootstrap.min.js"></script>
    <link rel="stylesheet" href="estilos.css">
  

</head>
<body class="bg-dark text-white" style="position: relative; height: 100vh; overflow: hidden;">
<div>
    <div style="position: absolute; width: 600px; height: 350px; background: linear-gradient(#d35400, #e67e22); border-radius: 0 0 300px 300px; top: 0; left: 50%; transform: translateX(-50%); z-index: 1; opacity: 0.8;"></div>
    
    <div style="position: absolute; width: 600px; height: 350px; background: linear-gradient(#e67e22, #d35400); border-radius: 300px 300px 0 0; bottom: 0; left: 50%; transform: translateX(-50%); z-index: 1; opacity: 0.8;"></div>

    <div style="position: absolute; width: 140px; height: 140px; background: #ff9f22; border-radius: 50%; top: 30%; left: 30%; z-index: 2; box-shadow: 0 0 20px #ff8c00;"></div>

    <div style="position: absolute; width: 70px; height: 70px; background: #ff9f22; border-radius: 50%; bottom: 35%; right: 35%; z-index: 2; box-shadow: 0 0 15px #ff8c00;"></div>


    <div class="container h-100" style="position: relative; z-index: 10;">

    <div class="container d-flex justify-content-center align-items-center h-100" style="position: relative; z-index: 10;">
        
        <div class="p-4 text-center" style="background: rgba(255, 255, 255, 0.07); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 20px; width: 100%; max-width: 360px;">

            <h3 class="fw-bold mb-5 text-uppercase" style="letter-spacing: 2px; font-size: 20px;">Iniciar Sesion</h3>
            
            <form action="Inicio.html">
                
                <div class="mb-4">
                    <input type="text" class="form-control text-white" placeholder="Usuario" required 
                           style="background: transparent; border: none; border-bottom: 2px solid #ffffff; border-radius: 0; padding-left: 0;">
                </div>
<div class="mb-5">
                    <input type="password" class="form-control text-white" placeholder="Contraseña" required 
                           style="background: transparent; border: none; border-bottom: 2px solid #ffffff; border-radius: 0; padding-left: 0;">
                </div>
                
                <button type="submit" class="btn fw-bold px-4 text-uppercase mb-4" 
                        style="background-color: #000000; color: #ff8c00; border: 1px solid #ff8c00; border-radius: 20px; font-size: 14px;">
                    Ingresar
                </button>
                
                <div class="mt-2">
                    <a href="#" class="text-white-50 text-decoration-none" style="font-size: 12px;">Te olvidaste la contraseña?</a>
                </div>

            </form>

        </div>
    </div>

</body>
</html>
